server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter's entry points are NOT fingerprinted (main.dart.js keeps the same
    # name across builds). Caching them long-term means a rebuild never reaches
    # the browser. Revalidate them on every load.
    location ~* ^/(index\.html|flutter_bootstrap\.js|main\.dart\.js|flutter\.js|version\.json|manifest\.json|flutter_service_worker\.js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Content-addressed bundles live under assets/ and canvaskit/ — safe to cache.
    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
    location /canvaskit/ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # SPA fallback: Flutter handles routing client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
