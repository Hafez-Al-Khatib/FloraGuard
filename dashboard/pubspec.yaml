name: plant_monitoring_dashboard
description: Cross-platform Flutter dashboard for the Plant Monitoring System.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  fl_chart: ^0.69.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  flutter_lints: ^5.0.0
  # In-app leaf capture (replaces the ESP32-CAM): device camera + JPEG normalize.
  image_picker: ^1.1.2
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
