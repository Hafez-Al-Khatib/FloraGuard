; AI-Thinker ESP32-CAM (classic ESP32 + OV2640). The pin map in main.cpp and the
; -mfix-esp32-psram-cache-issue flag are both for the classic ESP32, NOT the S3.
[env:esp32cam]
platform = espressif32@6.8.1
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    espressif/esp32-camera @ ^2.0.4
    bblanchon/ArduinoJson @ ^7.0.4
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
