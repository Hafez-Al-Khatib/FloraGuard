# General
# NOTE: with per_listener_settings=true, options like allow_anonymous and
# password_file are PER-LISTENER and must appear AFTER each `listener` line.
# Placing allow_anonymous before any listener makes Mosquitto 2.x refuse to
# start ("allow_anonymous option requires a listener to be defined first").
per_listener_settings true
autosave_interval 300
max_keepalive 300

# Persistent listeners
listener 8883
protocol mqtt
allow_anonymous false
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2
require_certificate false
use_identity_as_username false

password_file /mosquitto/config/passwd

# WebSockets listener (TLS)
listener 9001
protocol websockets
allow_anonymous false
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Topic ACLs (use separate acl_file in production for fine-grained per-node control)
# acl_file /mosquitto/config/acl
