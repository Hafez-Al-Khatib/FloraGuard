# Development Mosquitto configuration — NO TLS, anonymous access. DEV ONLY.
#
# Global settings must precede any `listener` line. With per_listener_settings
# left at its default (false), `allow_anonymous` is a global option, so this
# avoids the "allow_anonymous requires a listener first" error that occurs when
# per-listener settings are mixed before a listener is declared.
#
# Anonymous is intentional here: the dev broker is local-only and the placeholder
# passwd file has no users. The production config (mosquitto.conf) uses TLS +
# password auth instead.
allow_anonymous true
autosave_interval 300

listener 1883
protocol mqtt

listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
connection_messages true
