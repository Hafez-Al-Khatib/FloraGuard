version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: pms-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - pms-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: pms-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "8883:8883"
      - "9001:9001"
    networks:
      - pms-net
    environment:
      - MOSQUITTO_USERNAME=${MQTT_USERNAME}
      - MOSQUITTO_PASSWORD=${MQTT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 8883 -t 'health' -m 'ok' --cafile /mosquitto/certs/ca.crt -u ${MQTT_USERNAME} -P ${MQTT_PASSWORD} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2
    container_name: pms-influxdb
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-plantmonitor}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-telemetry}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUXDB_RETENTION:-30d}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2:ro
    ports:
      - "127.0.0.1:8086:8086"
    networks:
      - pms-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: pms-api
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - MQTT_HOST=mosquitto
      - MQTT_PORT=8883
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_CA_CERT=/run/secrets/mqtt_ca_cert
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-plantmonitor}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-telemetry}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN}
      - ENVIRONMENT=production
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-https://plant-hub.local,https://192.168.10.100}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Chat provider (the only outbound internet call in the system)
      - CHAT_PROVIDER=${CHAT_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
    volumes:
      - ./app/models:/app/models:ro
      - api-uploads:/app/uploads
    secrets:
      - mqtt_ca_cert
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - pms-net
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      # Route is mounted under the /api/v1 prefix â€” a bare /health returns 404
      # and would mark the container perpetually unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ../dashboard
      dockerfile: ${DASHBOARD_DOCKERFILE:-Dockerfile}
    container_name: pms-dashboard
    restart: unless-stopped
    networks:
      - pms-net
    # No ports exposed â€” nginx is the only entry point

  nginx:
    image: nginx:alpine
    container_name: pms-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - pms-net
    depends_on:
      - api
      - dashboard

volumes:
  redis-data:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  api-uploads:

networks:
  pms-net:
    driver: bridge

secrets:
  mqtt_ca_cert:
    file: ./mosquitto/certs/ca.crt
